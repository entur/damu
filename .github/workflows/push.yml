name: Build, push and deploy
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  maven-verify:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: 21.0.5+11
          distribution: liberica
      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-maven-
            ${{ runner.os }}-
      - run: mvn verify -P prettierCheck -Dprettier.nodePath=node -Dprettier.npmPath=npm
      - uses: actions/upload-artifact@v5.0.0
        with:
          path: target/*.jar
      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.ENTUR_SONAR_PASSWORD }}
          SONAR_PROJECT_NAME: ${{ github.event.repository.name }}
          SONAR_PROJECT_KEY: entur_${{ github.event.repository.name }}
        run: |
          mvn \
                  org.jacoco:jacoco-maven-plugin:prepare-agent verify \
                  org.jacoco:jacoco-maven-plugin:report sonar:sonar \
                  -P prettierSkip \
                  -Dmaven.main.skip \
                  -DskipTests \
                  -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
                  -Dsonar.organization=enturas-github \
                  -Dsonar.projectName=${SONAR_PROJECT_NAME} \
                  -Dsonar.host.url=https://sonarcloud.io \
                  -Dsonar.token=${SONAR_TOKEN}
  docker-build:
    if: github.repository_owner == 'entur' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [maven-verify]
    uses: entur/gha-docker/.github/workflows/build.yml@v1
    with:
      build_artifact_name: artifact
      build_artifact_path: target
  docker-push:
    needs: [docker-build]
    uses: entur/gha-docker/.github/workflows/push.yml@v1

  helm-lint:
    uses: entur/gha-helm/.github/workflows/lint.yml@v1
    with:
      environment: dev

  terraform-lint:
    uses: entur/gha-terraform/.github/workflows/lint.yml@v2

  # --- DEV ---
  tf-plan-dev:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    needs: [ terraform-lint, docker-push ]
    name: Terraform Plan DEV
    uses: entur/gha-terraform/.github/workflows/plan.yml@v2
    with:
      environment: dev

  tf-approval-dev:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-dev.outputs.has_changes == 'true' }}
    needs: [ tf-plan-dev ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Approve
    steps:
      - name: Manual approval
        shell: bash
        run: echo "Approve DEV tf plan"

  tf-apply-dev:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-dev.outputs.has_changes == 'true' }}
    needs: [ tf-plan-dev, tf-approval-dev ]
    name: Terraform Apply DEV
    uses: entur/gha-terraform/.github/workflows/apply.yml@v2
    with:
      environment: dev
      has_changes: ${{ needs.tf-plan-dev.outputs.has_changes }}

  deploy-dev:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    needs: [ helm-lint, tf-plan-dev, tf-apply-dev, docker-push ]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: dev
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag }}
      chart: helm/damu
      namespace: damu
      release_name: damu
    secrets: inherit

  # --- TST ---
  approval-tst:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    needs: [ deploy-dev, helm-lint, tf-plan-dev, tf-apply-dev, docker-push ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Approve
    steps:
      - name: Manual approval
        shell: bash
        run: echo "Approve TST deployment"

  tf-plan-tst:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    needs: [ terraform-lint, approval-tst ]
    name: Terraform Plan TST
    uses: entur/gha-terraform/.github/workflows/plan.yml@v2
    with:
      environment: tst

  tf-approval-tst:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-tst.outputs.has_changes == 'true' }}
    needs: [ tf-plan-tst ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Approve
    steps:
      - name: Manual approval
        shell: bash
        run: echo "Approve TST tf plan"

  tf-apply-tst:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-tst.outputs.has_changes == 'true' }}
    needs: [ tf-plan-tst, tf-approval-tst ]
    name: Terraform Apply TST
    uses: entur/gha-terraform/.github/workflows/apply.yml@v2
    with:
      environment: tst
      has_changes: ${{ needs.tf-plan-tst.outputs.has_changes }}

  deploy-tst:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    needs: [ approval-tst, tf-plan-tst, tf-apply-tst, docker-push ]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: tst
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag }}
      chart: helm/damu
      namespace: damu
      release_name: damu
    secrets: inherit

  # --- PRD ---
  approval-prd:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    needs: [ deploy-tst, approval-tst, tf-plan-tst, tf-apply-tst, docker-push ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Approve
    steps:
      - name: Manual approval
        shell: bash
        run: echo "Approve PRD deployment"

  tf-plan-prd:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    needs: [ terraform-lint, approval-prd ]
    name: Terraform Plan PRD
    uses: entur/gha-terraform/.github/workflows/plan.yml@v2
    with:
      environment: prd

  tf-approval-prd:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-prd.outputs.has_changes == 'true' }}
    needs: [ tf-plan-prd ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Approve
    steps:
      - name: Manual approval
        shell: bash
        run: echo "Approve PRD tf plan"

  tf-apply-prd:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-prd.outputs.has_changes == 'true' }}
    needs: [ tf-plan-prd, tf-approval-prd ]
    name: Terraform Apply PRD
    uses: entur/gha-terraform/.github/workflows/apply.yml@v2
    with:
      environment: prd
      has_changes: ${{ needs.tf-plan-prd.outputs.has_changes }}

  deploy-prd:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    needs: [ approval-prd, tf-plan-prd, tf-apply-prd, docker-push ]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: prd
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag }}
      chart: helm/damu
      namespace: damu
      release_name: damu
    secrets: inherit
